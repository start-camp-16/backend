services:
  - type: web
    name: mwohalgu-backend
    runtime: python
    buildCommand: pip install .
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/mwohalgu.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: CHAT_LOCATION_LIMIT
        value: 5
      - key: CHAT_POST_LIMIT
        value: 5
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: mwohalgu-data
      mountPath: /var/data
      sizeGB: 1
