openapi: 3.1.0
info:
  title: 뭐할구 API
  version: 1.0.0
  description: |
    서울 구별·카테고리별 추천 장소, 전체 장소 목록, 익명 게시판·댓글, 근거 기반 챗봇을 위한 공유 API 계약입니다.
    장소 랭킹은 시연용으로 선정한 추천 장소를 조합별 최대 5개 반환합니다.
servers:
  - url: http://localhost:8000
    description: 로컬 개발 서버
tags:
  - name: Meta
  - name: Rankings
  - name: Locations
  - name: Courses
  - name: Posts
  - name: Comments
  - name: Chat
  - name: Health
paths:
  /api/meta/categories:
    get:
      tags: [Meta]
      summary: 장소 카테고리 목록 조회
      operationId: getCategories
      responses:
        '200':
          description: 카테고리 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/meta/districts:
    get:
      tags: [Meta]
      summary: 서울 구 목록 조회
      operationId: getDistricts
      responses:
        '200':
          description: 장소 데이터에 존재하는 구 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistrictsResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/rankings:
    get:
      tags: [Rankings]
      summary: 구·카테고리별 장소 랭킹 조회
      description: 미리 선정한 추천 장소를 1위부터 최대 5개 반환합니다.
      operationId: getRankings
      parameters:
        - $ref: '#/components/parameters/DistrictQuery'
        - $ref: '#/components/parameters/CategoryQueryRequired'
      responses:
        '200':
          description: 장소 랭킹
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/locations:
    get:
      tags: [Locations]
      summary: 전체 장소 목록 조회
      operationId: getLocations
      parameters:
        - $ref: '#/components/parameters/DistrictQueryOptional'
        - $ref: '#/components/parameters/CategoryQueryOptional'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 필터링된 장소 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/course-suggestions:
    post:
      tags: [Courses]
      summary: 규칙 기반 코스 초안 생성
      description: 장소 좌표의 직선거리와 카테고리 균형을 이용하며 결과를 저장하지 않습니다.
      operationId: createCourseSuggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseSuggestionRequest'
      responses:
        '200':
          description: 추천 코스 초안
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseSuggestionResponse'
        '400':
          description: 입력 오류 또는 추천 장소 부족
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/courses:
    post:
      tags: [Courses]
      summary: 익명 코스 저장
      operationId: createCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreateRequest'
      responses:
        '201':
          description: 저장된 코스
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/LocationNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/courses/{public_id}:
    parameters:
      - $ref: '#/components/parameters/CoursePublicIdPath'
    get:
      tags: [Courses]
      summary: 공유 코스 조회
      operationId: getCourse
      responses:
        '200':
          description: 저장된 코스
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/CourseNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Courses]
      summary: 공유 코스 수정
      operationId: updateCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpdateRequest'
      responses:
        '200':
          description: 수정된 코스
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          description: 코스 또는 장소 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Courses]
      summary: 공유 코스 삭제
      operationId: deleteCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '204':
          description: 삭제 성공
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/CourseNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/posts:
    get:
      tags: [Posts]
      summary: 게시글 목록·검색
      operationId: getPosts
      parameters:
        - name: district
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PostDistrict'
        - name: prefix
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PostPrefix'
        - name: q
          in: query
          required: false
          description: 제목 또는 본문 부분 일치 검색어
          schema:
            type: string
            maxLength: 100
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 게시글 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Posts]
      summary: 게시글 작성
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
      responses:
        '201':
          description: 작성된 게시글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/posts/{post_id}:
    parameters:
      - $ref: '#/components/parameters/PostIdPath'
    get:
      tags: [Posts]
      summary: 게시글 상세 조회
      operationId: getPost
      responses:
        '200':
          description: 게시글 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Posts]
      summary: 게시글 수정
      operationId: updatePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdateRequest'
      responses:
        '200':
          description: 수정된 게시글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Posts]
      summary: 게시글 삭제
      description: 게시글 삭제 시 소속 댓글도 함께 삭제됩니다.
      operationId: deletePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '204':
          description: 삭제 성공
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/posts/{post_id}/comments:
    parameters:
      - $ref: '#/components/parameters/PostIdPath'
    get:
      tags: [Comments]
      summary: 게시글 댓글 목록 조회
      operationId: getComments
      responses:
        '200':
          description: 작성일 오름차순 댓글 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Comments]
      summary: 댓글 작성
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '201':
          description: 작성된 댓글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/comments/{comment_id}:
    parameters:
      - $ref: '#/components/parameters/CommentIdPath'
    put:
      tags: [Comments]
      summary: 댓글 수정
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdateRequest'
      responses:
        '200':
          description: 수정된 댓글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/CommentNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Comments]
      summary: 댓글 삭제
      operationId: deleteComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '204':
          description: 삭제 성공
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/CommentNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/chat:
    post:
      tags: [Chat]
      summary: 서울 지역 정보 챗봇 질의
      description: 장소와 게시글 검색 결과를 우선 활용하고 일반 지식으로 보완해 OpenAI 답변을 생성합니다.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: 챗봇 답변과 근거
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/ChatRateLimited'
        '502':
          $ref: '#/components/responses/ChatProviderError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/health:
    get:
      tags: [Health]
      summary: 서비스 상태 확인
      operationId: health
      responses:
        '200':
          description: 정상 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    DistrictQuery:
      name: district
      in: query
      required: true
      schema:
        type: string
        minLength: 1
      example: 강남구
    CategoryQueryRequired:
      name: category
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/LocationCategory'
    DistrictQueryOptional:
      name: district
      in: query
      required: false
      schema:
        type: [string, 'null']
        minLength: 1
      example: 강남구
    CategoryQueryOptional:
      name: category
      in: query
      required: false
      schema:
        anyOf:
          - $ref: '#/components/schemas/LocationCategory'
          - type: 'null'
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    PostIdPath:
      name: post_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CommentIdPath:
      name: comment_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CoursePublicIdPath:
      name: public_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9a-f]{32}$'
        minLength: 32
        maxLength: 32
  responses:
    ValidationError:
      description: 입력값 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: 입력값을 확인해 주세요.
            details: null
    PasswordMismatch:
      description: 비밀번호 불일치
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: PASSWORD_MISMATCH
            message: 비밀번호가 일치하지 않습니다.
            details: null
    PostNotFound:
      description: 게시글 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: POST_NOT_FOUND
            message: 게시글을 찾을 수 없습니다.
            details: null
    CommentNotFound:
      description: 댓글 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: COMMENT_NOT_FOUND
            message: 댓글을 찾을 수 없습니다.
            details: null
    CourseNotFound:
      description: 코스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: COURSE_NOT_FOUND
            message: 코스를 찾을 수 없습니다.
            details: null
    LocationNotFound:
      description: 장소 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: LOCATION_NOT_FOUND
            message: 장소를 찾을 수 없습니다.
            details: null
    ChatRateLimited:
      description: 챗봇 호출 제한
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CHAT_RATE_LIMITED
            message: 요청이 많습니다. 잠시 후 다시 시도해 주세요.
            details: null
    ChatProviderError:
      description: 외부 챗봇 제공자 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CHAT_PROVIDER_ERROR
            message: 챗봇 서비스에 연결할 수 없습니다.
            details: null
    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_ERROR
            message: 서버 오류가 발생했습니다.
            details: null
  schemas:
    LocationCategory:
      type: string
      enum: [관광지, 레포츠, 문화시설, 쇼핑, 숙박, 여행코스, 축제공연행사]
    PostDistrict:
      type: string
      enum:
        - 강남구
        - 강동구
        - 강북구
        - 강서구
        - 관악구
        - 광진구
        - 구로구
        - 금천구
        - 노원구
        - 도봉구
        - 동대문구
        - 동작구
        - 마포구
        - 서대문구
        - 서초구
        - 성동구
        - 성북구
        - 송파구
        - 양천구
        - 영등포구
        - 용산구
        - 은평구
        - 종로구
        - 중구
        - 중랑구
    PostPrefix:
      type: string
      enum: [관광, 맛집, 문화, 행사, 숙박, 쇼핑, 자유]
    CategoriesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LocationCategory'
      example:
        items: [관광지, 레포츠, 문화시설, 쇼핑, 숙박, 여행코스, 축제공연행사]
    DistrictsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: string
      example:
        items: [강남구, 강동구, 강북구, 기타]
    Pagination:
      type: object
      required: [page, size, total_items, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
    LocationItem:
      type: object
      required: [content_id, category, title, address, district, longitude, latitude, image_url, thumbnail_url, phone]
      properties:
        content_id:
          type: string
        category:
          $ref: '#/components/schemas/LocationCategory'
        title:
          type: string
        address:
          type: [string, 'null']
        district:
          type: string
        longitude:
          type: [number, 'null']
        latitude:
          type: [number, 'null']
        image_url:
          type: [string, 'null']
          format: uri
        thumbnail_url:
          type: [string, 'null']
          format: uri
        phone:
          type: [string, 'null']
    RankingItem:
      allOf:
        - $ref: '#/components/schemas/LocationItem'
        - type: object
          required: [rank]
          properties:
            rank:
              type: integer
              minimum: 1
              maximum: 5
    RankingResponse:
      type: object
      required: [district, category, items]
      properties:
        district:
          type: string
        category:
          $ref: '#/components/schemas/LocationCategory'
        items:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/RankingItem'
    LocationListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LocationItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CourseSuggestionRequest:
      type: object
      additionalProperties: false
      required: [district, categories, stop_count]
      properties:
        district:
          type: string
          minLength: 1
        categories:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            $ref: '#/components/schemas/LocationCategory'
        stop_count:
          type: integer
          minimum: 3
          maximum: 5
    CourseStop:
      type: object
      required: [position, distance_from_previous_meters, location]
      properties:
        position:
          type: integer
          minimum: 1
          maximum: 5
        distance_from_previous_meters:
          type: [integer, 'null']
          minimum: 0
        location:
          $ref: '#/components/schemas/LocationItem'
    CourseSuggestionResponse:
      type: object
      required: [district, categories, stops, total_straight_line_distance_meters]
      properties:
        district:
          type: string
        categories:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: '#/components/schemas/LocationCategory'
        stops:
          type: array
          minItems: 3
          maxItems: 5
          items:
            $ref: '#/components/schemas/CourseStop'
        total_straight_line_distance_meters:
          type: integer
          minimum: 0
    CourseCreateRequest:
      type: object
      additionalProperties: false
      required: [title, password, location_content_ids]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 4
          maxLength: 20
          writeOnly: true
        location_content_ids:
          type: array
          minItems: 3
          maxItems: 5
